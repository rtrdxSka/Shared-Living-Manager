services:

  # ── MongoDB (single-node replica set, no host port) ─────────────────────
  mongodb:
    image: mongo:7
    restart: unless-stopped
    # Generate a random keyfile at startup and launch mongod with replica-set
    # and auth enabled (mirrors the dev compose approach).
    entrypoint: >
      bash -c '
        openssl rand -base64 756 > /tmp/mongo-keyfile &&
        chmod 400 /tmp/mongo-keyfile &&
        chown mongodb:mongodb /tmp/mongo-keyfile &&
        exec docker-entrypoint.sh "$$@"
      ' --
    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all
      - --keyFile
      - /tmp/mongo-keyfile
      - --auth
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - splitmate-net
    ports:
      - "27017:27017"
    # MongoDB is NOT exposed to the host — backend reaches it on the
    # internal Docker network only.
    healthcheck:
      test:
        - CMD
        - mongosh
        - --quiet
        - --username
        - ${MONGO_ROOT_USERNAME}
        - --password
        - ${MONGO_ROOT_PASSWORD}
        - --authenticationDatabase
        - admin
        - --eval
        - >-
          try { rs.status().ok }
          catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}).ok }
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Express backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: >-
        mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DB_NAME}?authSource=admin&directConnection=true
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS}
      FRONTEND_URL: ${FRONTEND_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      FROM_EMAIL: ${FROM_EMAIL}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - splitmate-net
    # Backend is NOT exposed to the host — nginx reaches it on the
    # internal Docker network only.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── NGINX reverse proxy + static SPA ────────────────────────────────────
  # Built from FrontEnd/Dockerfile.prod using the repo root as context so
  # the multi-stage build can access both FrontEnd/ and nginx/ directories.
  nginx:
    build:
      context: .
      dockerfile: FrontEnd/Dockerfile.prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # TLS certificates generated by scripts/generate-certs.sh
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - splitmate-net

volumes:
  mongodb_data:
  mongodb_config:

networks:
  splitmate-net:
    driver: bridge
