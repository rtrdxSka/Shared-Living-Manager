# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──────────────────────────────────────────────────────────
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # ── TLS certificates (mounted at runtime via docker volume) ───────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header X-XSS-Protection          "1; mode=block"                     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Static file root ──────────────────────────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    # ── Service worker + Workbox runtime — MUST NOT be cached ────────────────
    location ~* (sw\.js|workbox-[a-f0-9]+\.js)$ {
        expires    -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files  $uri =404;
    }

    # ── Web App Manifest ──────────────────────────────────────────────────────
    location = /manifest.webmanifest {
        expires    1d;
        add_header Cache-Control "public, max-age=86400";
        try_files  $uri =404;
    }

    # ── Static assets — long-lived cache ─────────────────────────────────
    location ~* \.(?:css|js|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|ico)$ {
        expires    30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Auth API — stricter rate limit ────────────────────────────────────
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass             http://backend:5000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       X-Forwarded-Host  $host;
        proxy_connect_timeout  5s;
        proxy_read_timeout     30s;
    }

    # ── General API proxy ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;

        proxy_pass             http://backend:5000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       X-Forwarded-Host  $host;
        proxy_connect_timeout  5s;
        proxy_read_timeout     60s;
    }

    # ── SPA fallback (must come last to not swallow /api) ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
