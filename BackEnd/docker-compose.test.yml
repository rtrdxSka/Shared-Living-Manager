services:
  mongo-test:
    image: mongo:7
    container_name: slm-mongo-test
    ports:
      - "127.0.0.1:27018:27017"
    command: ["--replSet", "rs0", "--bind_ip_all", "--quiet", "--logpath", "/dev/null"]
    tmpfs:
      - /data/db
    healthcheck:
      # Self-initiating healthcheck: tries rs.status() first; if that fails (replica
      # set not yet initiated), runs rs.initiate(). Once initiated, rs.status() is
      # the no-op success path on subsequent checks.
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok && quit(0) }
          catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] });
            quit(0);
          }
          quit(1);
        "
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
