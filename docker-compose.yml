services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: splitmate-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-admin123}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-splitmate}
    volumes:
      - mongodb_data:/data/db
    networks:
      - splitmate-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API
  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: splitmate-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-admin123}@mongodb:27017/${MONGO_DB_NAME:-splitmate}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-12}
      FRONTEND_URL: http://localhost:5173
    volumes:
      - ./BackEnd/src:/app/src
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - splitmate-network

  # Frontend Vite Dev Server
  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: splitmate-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./FrontEnd/src:/app/src
      - ./FrontEnd/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - splitmate-network

volumes:
  mongodb_data:
    driver: local

networks:
  splitmate-network:
    driver: bridge